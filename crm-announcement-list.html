<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社區公告</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-announcement-list.css">
  <link rel="stylesheet" href="css/crm-bottom-nav.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>

  <!-- 社區公告清單頁面容器 -->
  <div class="crm-announcement-list has-bottom-nav">

    <!-- 頂部導覽列（共用元件） -->
    <div id="crmHeader" data-title="社區公告" data-back="crm-index_life.html"></div>

    <!-- 頂部導覽列佔位 -->
    <div class="header-spacer"></div>

    <!-- 主要內容區域 -->
    <div class="main-content">

      <!-- 分類篩選標籤列 -->
      <div class="filter-tabs" id="announcementFilterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="important">重要公告</button>
        <button class="filter-tab" data-filter="activity">社區活動</button>
        <button class="filter-tab" data-filter="water-power">停水停電</button>
        <button class="filter-tab" data-filter="maintenance">維修保養</button>
      </div>

      <!-- 公告卡片清單（由 JS 動態產生） -->
      <div class="announcement-list" id="announcementList"></div>

      <!-- 空狀態：篩選後無資料時顯示 -->
      <div class="empty-state" id="announcementEmptyState" style="display: none;">
        <div class="empty-icon">
          <img src="assets/empty-record-icon.svg" alt="" loading="lazy">
        </div>
        <p class="empty-text">目前無相關公告</p>
      </div>

    </div>
    <!-- /main-content -->

  </div>
  <!-- /crm-announcement-list -->

  <!-- 常駐底部選單 -->
  <div id="crmBottomNav"></div>

  <!-- JavaScript -->
  <script src="js/crm-header.js"></script>
  <script src="js/crm-announcement-data.js"></script>
  <script src="js/crm-announcement-list.js" defer></script>
  <script src="js/crm-bottom-nav.js" defer></script>
  <script src="js/crm-loading.js"></script>
</body>
</html>
