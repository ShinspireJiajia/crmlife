<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>付款結果</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-repair-payment.css">

  <!-- Loading 遮罩 inline 樣式 -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}

    /* 結果頁樣式 */
    .result-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
      text-align: center;
      position: relative;
      z-index: 1;
      flex: 1;
    }
    .result-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 40px;
    }
    .result-icon.success {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .result-icon.fail {
      background-color: #fbe9e7;
      color: #c62828;
    }
    .result-title {
      font-size: 22px;
      font-weight: 700;
      color: #3a4246;
      margin-bottom: 8px;
    }
    .result-message {
      font-size: 14px;
      color: #6b6560;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .result-detail {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      margin-bottom: 32px;
      text-align: left;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 8px;
      color: #3a4246;
    }
    .result-row:last-child {
      margin-bottom: 0;
    }
    .result-row .label {
      color: #6b6560;
    }
    .result-row .value {
      font-weight: 500;
    }
    .result-row .value.amount {
      color: #b8a676;
      font-weight: 700;
    }
    .btn-back-detail {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px;
      background-color: #b8a676;
      color: #ffffff;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 500;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .btn-back-detail:hover { opacity: 0.9; }
    .btn-back-detail:active { opacity: 0.8; }
    .btn-retry {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background-color: transparent;
      color: #6b6560;
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 400;
      font-size: 15px;
      border: 1px solid #d4d0c8;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-retry:hover { background-color: rgba(0,0,0,0.03); }
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>

  <!-- 付款結果頁面容器 -->
  <div class="crm-repair-payment">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列 -->
    <div id="crmHeader" data-title="付款結果" data-back="none"></div>

    <!-- 結果內容 -->
    <div class="result-container" id="resultContainer">
      <!-- 由 JS 動態填入 -->
    </div>

  </div>

  <!-- 共用頂部導覽列元件 -->
  <script src="js/crm-header.js" defer></script>
  <script src="js/crm-loading.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var urlParams = new URLSearchParams(window.location.search);
      var status = urlParams.get('status') || 'success';
      var caseNo = urlParams.get('caseNo') || '';
      var quotationNo = urlParams.get('quotationNo') || '';
      var amount = urlParams.get('amount') || '0';
      var method = urlParams.get('method') || '';

      var container = document.getElementById('resultContainer');

      if (status === 'success') {
        container.innerHTML = '' +
          '<div class="result-icon success">✓</div>' +
          '<p class="result-title">付款成功</p>' +
          '<p class="result-message">您的付款已完成，我們將儘速安排後續作業。</p>' +
          '<div class="result-detail">' +
            '<p class="result-row"><span class="label">報價單號</span><span class="value">' + quotationNo + '</span></p>' +
            '<p class="result-row"><span class="label">付款金額</span><span class="value amount">NT$ ' + amount + '</span></p>' +
            '<p class="result-row"><span class="label">付款方式</span><span class="value">' + method + '</span></p>' +
            '<p class="result-row"><span class="label">交易時間</span><span class="value">' + new Date().toLocaleString('zh-TW') + '</span></p>' +
          '</div>' +
          '<button class="btn-back-detail" id="btnBackDetail">返回報修單</button>';

        document.getElementById('btnBackDetail').addEventListener('click', function () {
          window.location.href = 'crm-repair-detail.html?order=' + encodeURIComponent(caseNo) +
            '&status=已完成&hasQuotation=true&paymentStatus=paid' +
            '&quotationNo=' + encodeURIComponent(quotationNo) +
            '&amount=' + encodeURIComponent(amount);
        });
      } else {
        container.innerHTML = '' +
          '<div class="result-icon fail">✗</div>' +
          '<p class="result-title">付款失敗</p>' +
          '<p class="result-message">很抱歉，交易未能完成。請確認付款資訊後重新嘗試。</p>' +
          '<button class="btn-back-detail" id="btnRetryPay">重新付款</button>' +
          '<button class="btn-retry" id="btnBackDetail2">返回報修單</button>';

        document.getElementById('btnRetryPay').addEventListener('click', function () {
          window.location.href = 'crm-repair-payment.html?caseNo=' + encodeURIComponent(caseNo) +
            '&quotationNo=' + encodeURIComponent(quotationNo) +
            '&amount=' + encodeURIComponent(amount);
        });

        document.getElementById('btnBackDetail2').addEventListener('click', function () {
          window.location.href = 'crm-repair-detail.html?order=' + encodeURIComponent(caseNo) +
            '&status=已完成&hasQuotation=true&paymentStatus=confirmed' +
            '&quotationNo=' + encodeURIComponent(quotationNo) +
            '&amount=' + encodeURIComponent(amount);
        });
      }
    });
  </script>
</body>
</html>
