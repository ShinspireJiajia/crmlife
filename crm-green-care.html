<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>綠海養護</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-green-care.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 綠海養護頁面容器 -->
  <div class="crm-green-care" data-node-id="1:3110">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="1:3111">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="綠海養護"></div>

    <!-- 主要內容區域：合約卡片列表 -->
    <div class="main-content" data-node-id="1:3112">

      <!-- 合約卡片 1：2025年度養護合約（待簽署） -->
      <div class="contract-card" data-status="pending" data-node-id="1:3113">
        <!-- 卡片標題列 -->
        <div class="card-header" data-node-id="1:3114">
          <div class="card-title-wrap" data-node-id="1:3115">
            <p class="card-title" data-node-id="1:3116">2025年度養護合約</p>
          </div>
          <div class="status-badge status-pending" data-node-id="1:3117">
            <span data-node-id="1:3118">待簽署</span>
          </div>
        </div>
        <!-- 合約資訊 -->
        <div class="card-info" data-node-id="1:3119">
          <p data-node-id="1:3120">
            <span class="info-label">合約代碼</span><span class="info-value">｜GS-2026-001</span>
          </p>
          <p data-node-id="1:3121">
            <span class="info-label">合約期間</span><span class="info-value">｜2026/01/01-2026/12/31</span>
          </p>
          <p data-node-id="1:3122">
            <span class="info-label">剩餘次數</span><span class="info-value">｜--</span>
          </p>
        </div>
        <!-- 操作按鈕區 -->
        <div class="card-actions" data-node-id="1:3123">
          <div class="action-row" data-node-id="1:3124">
            <button class="btn-action" data-node-id="1:3125" data-action="contract-info">
              <span data-node-id="1:3126">合約資訊</span>
            </button>
            <button class="btn-action" data-node-id="1:3127" data-action="reserve-service">
              <span data-node-id="1:3128">預約服務</span>
            </button>
          </div>
          <div class="action-row" data-node-id="1:3129">
            <button class="btn-action" data-node-id="1:3130" data-action="reserve-record">
              <span data-node-id="1:3131">預約紀錄</span>
            </button>
            <button class="btn-action" data-node-id="1:3132" data-action="payment-info">
              <span data-node-id="1:3133">繳費資訊</span>
            </button>
          </div>
        </div>
      </div>

      <!-- 合約卡片 2：2024年度養護合約（已簽署） -->
      <div class="contract-card" data-status="signed" data-node-id="1:3134">
        <!-- 卡片標題列 -->
        <div class="card-header" data-node-id="1:3135">
          <div class="card-title-wrap" data-node-id="1:3136">
            <p class="card-title" data-node-id="1:3137">2024年度養護合約</p>
          </div>
          <div class="status-badge status-signed" data-node-id="1:3138">
            <span data-node-id="1:3139">已簽署</span>
          </div>
        </div>
        <!-- 合約資訊 -->
        <div class="card-info" data-node-id="1:3140">
          <p data-node-id="1:3141">
            <span class="info-label">合約代碼</span><span class="info-value">｜GS-2024-001</span>
          </p>
          <p data-node-id="1:3142">
            <span class="info-label">合約期間</span><span class="info-value">｜2024/01/01-2024/12/31</span>
          </p>
          <p data-node-id="1:3143">
            <span class="info-label">剩餘次數</span><span class="info-value">｜5次</span>
          </p>
        </div>
        <!-- 操作按鈕區 -->
        <div class="card-actions" data-node-id="1:3144">
          <div class="action-row" data-node-id="1:3145">
            <button class="btn-action" data-node-id="1:3146" data-action="contract-info">
              <span data-node-id="1:3147">合約資訊</span>
            </button>
            <button class="btn-action" data-node-id="1:3148" data-action="reserve-service">
              <span data-node-id="1:3149">預約服務</span>
            </button>
          </div>
          <div class="action-row" data-node-id="1:3150">
            <button class="btn-action" data-node-id="1:3151" data-action="reserve-record">
              <span data-node-id="1:3152">預約紀錄</span>
            </button>
            <button class="btn-action" data-node-id="1:3153" data-action="payment-info">
              <span data-node-id="1:3154">繳費資訊</span>
            </button>
          </div>
        </div>
      </div>

    </div>
    <!-- /main-content -->

  </div>
  <!-- /crm-green-care -->

  <!-- 頁面互動邏輯 -->
  <!-- 共用頂部導覽列元件 -->

  <script src="js/crm-header.js" defer></script>

  <script src="js/crm-green-care.js" defer></script>
  <script src="js/crm-loading.js"></script>
</body>
</html>
