<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>戶別詳情</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-unit-detail.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 戶別詳情頁面容器 -->
  <div class="crm-unit-detail" data-node-id="1:5492">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="房屋保固" data-back="crm-unit-info.html"></div>

    <!-- 分頁標籤列（水平捲動） -->
    <div class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="warranty">房屋保固</button>
      <button class="tab-btn" data-tab="progress">建案工程進度</button>
      <button class="tab-btn" data-tab="contract">合約紀錄</button>
      <button class="tab-btn" data-tab="payment">履約款項</button>
    </div>

    <!-- 主要內容區域 -->
    <div class="main-content">

      <!-- 分頁內容：房屋保固 -->
      <div class="tab-panel active" id="panelWarranty" data-node-id="1:5494">
        <!-- 由 JS 動態產生 -->
      </div>

      <!-- 分頁內容：建案工程進度 -->
      <div class="tab-panel" id="panelProgress" data-node-id="1:5714">
        <!-- 由 JS 動態產生 -->
      </div>

      <!-- 分頁內容：合約紀錄 -->
      <div class="tab-panel" id="panelContract" data-node-id="1:5630">
        <!-- 由 JS 動態產生 -->
      </div>

      <!-- 分頁內容：履約款項 -->
      <div class="tab-panel" id="panelPayment">
        <!-- 由 JS 動態產生 -->
      </div>

    </div>
    <!-- /main-content -->

  </div>
  <!-- /crm-unit-detail -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <!-- JavaScript -->
  <script src="js/crm-unit-detail.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
