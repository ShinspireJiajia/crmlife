<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物業人員</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-bind-property.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 物業人員頁面容器 -->
  <div class="crm-bind-property" data-node-id="1:2832">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="1:2833">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="物業人員" data-back="crm-bind-identity.html"></div>

    <!-- 主要內容區域 -->
    <div class="main-content" data-node-id="1:2836">

      <!-- ====== 表單區（預設顯示） ====== -->
      <div class="view-form" id="viewForm">
        <form class="register-form" id="registerForm">

          <!-- 建案（下拉選單） -->
          <div class="form-group" data-node-id="1:2837">
            <label class="form-label" data-node-id="1:2838">建案</label>
            <div class="form-select-wrapper" data-node-id="1:2839">
              <select class="form-select" id="fieldProject" name="project" required>
                <option value="">請選擇建案</option>
                <option value="greenocean" selected>綠海建案</option>
              </select>
            </div>
          </div>

          <!-- 物業人員通行碼 -->
          <div class="form-group" data-node-id="1:2840">
            <label class="form-label" data-node-id="1:2842">物業人員通行碼</label>
            <input class="form-input" type="text" id="fieldPasscode" name="passcode"
                   placeholder="請輸入通行碼" required data-node-id="1:2843">
          </div>

          <!-- 姓名 -->
          <div class="form-group" data-node-id="1:2844">
            <label class="form-label" data-node-id="1:2846">姓名</label>
            <input class="form-input" type="text" id="fieldName" name="name"
                   placeholder="請輸入姓名" required data-node-id="1:2847">
          </div>

          <!-- 手機 -->
          <div class="form-group" data-node-id="1:2848">
            <label class="form-label" data-node-id="1:2850">手機</label>
            <input class="form-input" type="tel" id="fieldPhone" name="phone"
                   placeholder="請輸入手機" required data-node-id="1:2851">
          </div>

          <!-- 確認註冊按鈕 -->
          <div class="form-action" data-node-id="1:2852">
            <button class="btn-submit" type="submit" id="btnSubmit" data-node-id="1:2853">
              <span data-node-id="1:2854">確認註冊</span>
            </button>
          </div>

        </form>
      </div>

    </div>
    <!-- /main-content -->

  </div>
  <!-- /crm-bind-property -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <!-- JavaScript -->
  <script src="js/crm-bind-property.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
