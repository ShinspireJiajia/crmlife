<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約房屋健診服務</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-house-checkup-reserve.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 預約房屋健診服務頁面容器 -->
  <div class="crm-house-checkup-reserve" data-node-id="248:2027">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="248:2028">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="預約房屋健診服務" data-back="crm-house-checkup.html"></div>

    <!-- 主要內容區域 -->
    <div class="form-content" data-node-id="248:2029">

      <!-- 提示訊息 -->
      <div class="form-hint" data-node-id="248:2030">
        <p class="hint-title" data-node-id="248:2031">您可建立一筆健診預約</p>
      </div>

      <!-- 活動說明區塊（由後端動態載入 HTML 內容） -->
      <div class="activity-description" id="activityDescription">
        <div class="activity-description-header">
          <p class="activity-description-title">活動說明</p>
        </div>
        <div class="activity-description-body" id="activityDescriptionBody">
          <!-- 此區塊內容由後端 API 提供，可包含任意 HTML -->
          <p>一年一度壁癌健檢活動，由專業技師到府檢測，檢查項目包含：</p>
          <ul>
            <li>外牆滲漏檢測</li>
            <li>室內壁癌評估</li>
            <li>浴室防水狀態確認</li>
            <li>窗框密封性檢查</li>
          </ul>
          <p>活動期間：2025/09/15 ~ 2025/09/30<br>服務時段：每日 09:00–17:00</p>
        </div>
      </div>

      <!-- 檢查清單檔案下載區 -->
      <div class="checklist-download-section" id="checklistDownloadSection">
        <div class="section-header">
          <img class="section-icon" src="assets/download-icon.svg" alt="" loading="lazy">
          <p class="section-title">檢查清單下載</p>
        </div>
        <div class="attachment-item">
          <p class="file-name">健檢檢查清單.pdf</p>
          <button class="download-btn" data-action="download" data-file="checkup-checklist.pdf">
            <img src="assets/download-btn.svg" alt="下載" loading="lazy">
          </button>
        </div>
        <div class="attachment-item">
          <p class="file-name">住戶自主檢查表.pdf</p>
          <button class="download-btn" data-action="download" data-file="self-check-form.pdf">
            <img src="assets/download-btn.svg" alt="下載" loading="lazy">
          </button>
        </div>
      </div>

      <!-- 表單欄位 -->
      <form class="form-fields" id="checkupForm" data-node-id="248:2032">

        <!-- 建案 -->
        <div class="form-group" data-node-id="248:2033">
          <p class="form-label" data-node-id="248:2034">
            建案<span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="project" name="project" required data-node-id="248:2035">
              <option value="">請選擇建案</option>
              <option value="greenocean" selected>綠海建案</option>
            </select>
          </div>
        </div>

        <!-- 戶別 -->
        <div class="form-group" data-node-id="248:2036">
          <p class="form-label" data-node-id="248:2037">
            戶別 <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="unit" name="unit" required data-node-id="248:2038">
              <option value="">請選擇戶別</option>
              <option value="B1" selected>B1</option>
            </select>
          </div>
        </div>

        <!-- 日期 -->
        <div class="form-group" data-node-id="248:2042">
          <p class="form-label" data-node-id="248:2043">
            日期 <span class="required">＊</span>
          </p>
          <div class="form-date-wrapper">
            <input class="form-date" type="date" id="date" name="date" required data-node-id="248:2044">
            <img class="calendar-icon" src="assets/calendar-icon.svg" alt="" loading="lazy">
          </div>
        </div>

        <!-- 時段 -->
        <div class="form-group" data-node-id="248:2053">
          <p class="form-label" data-node-id="248:2054">
            時段 <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="timeSlot" name="timeSlot" required data-node-id="248:2055">
              <option value="">請選擇時段</option>
              <option value="09:00">09:00</option>
              <option value="10:00">10:00</option>
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
            </select>
          </div>
        </div>

        <!-- 姓名 -->
        <div class="form-group" data-node-id="248:2056">
          <p class="form-label" data-node-id="248:2057">
            姓名 <span class="required">＊</span>
          </p>
          <input class="form-input" type="text" id="name" name="name" placeholder="請輸入姓名" required data-node-id="248:2058">
        </div>

        <!-- 手機 -->
        <div class="form-group" data-node-id="248:2059">
          <p class="form-label" data-node-id="248:2060">
            手機 <span class="required">＊</span>
          </p>
          <input class="form-input" type="tel" id="phone" name="phone" placeholder="請輸入手機" required data-node-id="248:2061">
        </div>

      </form>

      <!-- 底部按鈕 -->
      <div class="form-actions" data-node-id="248:2062">
        <button class="btn btn-leave" id="btnLeave" data-node-id="248:2063">
          離開
        </button>
        <button class="btn btn-confirm" id="btnConfirm" data-node-id="248:2065">
          確認建立
        </button>
      </div>

    </div>
    <!-- /form-content -->

  </div>
  <!-- /crm-house-checkup-reserve -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <!-- JavaScript -->
  <script src="js/crm-house-checkup-reserve.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
