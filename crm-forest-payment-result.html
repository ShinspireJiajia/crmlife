<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>森林聚落 - 款項明細</title>
  <!-- Google Fonts: Noto Sans TC & Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-forest-payment-result.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 款項明細結果頁面容器 -->
  <div class="crm-forest-payment-result">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="款項明細" data-back="crm-forest-payment.html"></div>

    <!-- 結果內容區域 -->
    <div class="result-content">

      <!-- 結果提示卡片 -->
      <div class="result-card">
        <!-- 狀態圖示 -->
        <img class="result-icon" id="resultIcon" src="assets/icon-payment-success.svg" alt="" loading="lazy">
        <!-- 狀態標題 -->
        <p class="result-title" id="resultTitle">付款完成</p>
        <!-- 錯誤訊息（僅失敗時顯示） -->
        <p class="result-message" id="resultMessage" style="display: none;"></p>
      </div>

      <!-- 確認按鈕 -->
      <button class="btn-confirm" id="btnConfirm">確認</button>

    </div>

  </div>

  <!-- 頁面互動邏輯 -->
  <!-- 共用頂部導覽列元件 -->

  <script src="js/crm-header.js" defer></script>

  <script src="js/crm-forest-payment-result.js" defer></script>
  <script src="js/crm-loading.js"></script>
</body>
</html>
