<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約驗屋服務</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-inspection-reserve.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 預約驗屋服務頁面容器 -->
  <div class="crm-inspection-reserve" data-node-id="29:2253">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="29:2254">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="預約驗屋服務" data-back="crm-inspection-service.html"></div>

    <!-- 主要內容區域 -->
    <div class="form-content" data-node-id="29:2255">

      <!-- 提示訊息 -->
      <div class="form-hint" data-node-id="29:2256">
        <p class="hint-text" data-node-id="29:2257">您可建立一筆驗屋服務</p>
      </div>

      <!-- 表單欄位 -->
      <form class="form-fields" id="inspectionForm" data-node-id="29:2258">

        <!-- 建案 -->
        <div class="form-group" data-node-id="29:2259">
          <p class="form-label" data-node-id="29:2260">
            建案<span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="project" name="project" required data-node-id="29:2261">
              <option value="">請選擇建案</option>
              <option value="greenocean" selected>綠海建案</option>
            </select>
          </div>
        </div>

        <!-- 戶別 -->
        <div class="form-group" data-node-id="29:2262">
          <p class="form-label" data-node-id="29:2263">
            戶別 <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="unit" name="unit" required data-node-id="29:2264">
              <option value="">請選擇戶別</option>
              <option value="B1" selected>B1</option>
            </select>
          </div>
        </div>

        <!-- 日期 -->
        <div class="form-group" data-node-id="29:2268">
          <p class="form-label" data-node-id="29:2269">
            日期 <span class="required">＊</span>
          </p>
          <div class="form-date-wrapper">
            <input class="form-date" type="date" id="date" name="date" value="2025-08-23" required data-node-id="29:2270">
            <img class="calendar-icon" src="assets/calendar-icon.svg" alt="" loading="lazy">
          </div>
        </div>

        <!-- 時段 -->
        <div class="form-group" data-node-id="29:2279">
          <p class="form-label" data-node-id="29:2280">
            時段 <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="timeSlot" name="timeSlot" required data-node-id="29:2281">
              <option value="">請選擇時段</option>
              <option value="10:00" selected>10:00</option>
              <option value="14:00">14:00</option>
            </select>
          </div>
        </div>

        <!-- 出席人數 (不含設計師) -->
        <div class="form-group" data-node-id="29:2282">
          <p class="form-label" data-node-id="29:2283">
            出席人數 (不含設計師) <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="attendees" name="attendees" required data-node-id="29:2284">
              <option value="">請選擇人數</option>
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>

        <!-- 設計師人數 (無則填 0) -->
        <div class="form-group" data-node-id="29:2285">
          <p class="form-label" data-node-id="29:2286">
            設計師人數 (無則填 0) <span class="required">＊</span>
          </p>
          <div class="form-select-wrapper">
            <select class="form-select" id="designers" name="designers" required data-node-id="29:2287">
              <option value="0" selected>0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
        </div>

        <!-- 第三方代驗 -->
        <div class="form-group" data-node-id="29:2288">
          <p class="form-label" data-node-id="29:2289">第三方代驗</p>
          <div class="radio-group" data-node-id="29:2290">
            <label class="radio-item" data-node-id="29:2291">
              <input type="radio" name="thirdParty" value="yes" checked>
              <span class="radio-custom"></span>
              <span class="radio-text" data-node-id="29:2293">是</span>
            </label>
            <label class="radio-item" data-node-id="29:2294">
              <input type="radio" name="thirdParty" value="no">
              <span class="radio-custom"></span>
              <span class="radio-text" data-node-id="29:2296">否</span>
            </label>
          </div>
        </div>

        <!-- 第三方驗屋公司 -->
        <div class="form-group" id="thirdPartyCompanyGroup" data-node-id="29:2297">
          <p class="form-label" data-node-id="29:2298">
            第三方驗屋公司 <span class="required">＊</span>
          </p>
          <div class="form-input-wrapper">
            <input class="form-input" type="text" id="thirdPartyCompany" name="thirdPartyCompany" placeholder="請輸入驗屋公司全名" data-node-id="29:2299">
          </div>
        </div>

      </form>

      <!-- 底部按鈕 -->
      <div class="form-actions" data-node-id="29:2300">
        <button class="btn btn-leave" id="btnLeave" data-node-id="29:2301">
          離開
        </button>
        <button class="btn btn-confirm" id="btnConfirm" data-node-id="29:2303">
          確認建立
        </button>
      </div>

    </div>
    <!-- /form-content -->

  </div>
  <!-- /crm-inspection-reserve -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <!-- JavaScript -->
  <script src="js/crm-inspection-reserve.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
