<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我要報修</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-repair-form.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 報修表單頁面容器 -->
  <div class="crm-repair-form" data-node-id="1:1908">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="我要報修"></div>

    <!-- ==================== 表單視圖 ==================== -->
    <div class="form-view" id="formView">

      <!-- 標籤切換列 -->
      <div class="tab-bar" data-node-id="1:1949">
        <button class="tab-item active" id="tabCase" data-tab="case" data-node-id="1:1950">個案單報修</button>
        <button class="tab-item" id="tabGreen" data-tab="green" data-node-id="1:1952">綠海報修</button>
      </div>

      <!-- 表單內容 -->
      <div class="form-content" data-node-id="1:1910">
        <div class="form-fields" data-node-id="1:1911">

          <!-- 建案 -->
          <div class="form-group" data-node-id="1:1912">
            <label class="form-label" data-node-id="1:1913">建案</label>
            <div class="select-wrap" data-node-id="1:1914">
              <select class="form-select" id="selectProject">
                <option value="">請選擇建案</option>
                <option value="green">綠海建案</option>
              </select>
              <img class="select-arrow" src="assets/select-arrow.svg" alt="">
            </div>
          </div>

          <!-- 戶別 -->
          <div class="form-group" data-node-id="1:1915">
            <label class="form-label" data-node-id="1:1916">戶別</label>
            <div class="select-wrap" data-node-id="1:1917">
              <select class="form-select" id="selectUnit">
                <option value="">請先選擇建案</option>
              </select>
              <img class="select-arrow" src="assets/select-arrow.svg" alt="">
            </div>
          </div>

          <!-- 維修區域 -->
          <div class="form-group" data-node-id="1:1918">
            <label class="form-label" data-node-id="1:1919">維修區域</label>
            <div class="select-wrap" data-node-id="1:1920">
              <select class="form-select" id="selectArea">
                <option value="">請選擇</option>
                <option value="living">客廳</option>
                <option value="bathroom">浴室</option>
                <option value="kitchen">廚房</option>
                <option value="bedroom">臥室</option>
                <option value="balcony">陽台</option>
              </select>
              <img class="select-arrow" src="assets/select-arrow.svg" alt="">
            </div>
          </div>

          <!-- 維修位置（僅綠海報修顯示） -->
          <div class="form-group green-only" id="groupPosition" data-node-id="1:1967" style="display: none;">
            <label class="form-label" data-node-id="1:1968">維修位置</label>
            <div class="select-wrap" data-node-id="1:1969">
              <select class="form-select" id="selectPosition">
                <option value="">請選擇</option>
                <option value="faucet">水龍頭</option>
                <option value="pipe">水管</option>
                <option value="wall">牆壁</option>
                <option value="floor">地板</option>
                <option value="ceiling">天花板</option>
              </select>
              <img class="select-arrow" src="assets/select-arrow.svg" alt="">
            </div>
          </div>

          <!-- 問題描述 -->
          <div class="form-group" data-node-id="1:1930">
            <label class="form-label" data-node-id="1:1931">問題描述</label>
            <textarea class="form-textarea" id="textDescription" placeholder="請輸入問題描述" data-node-id="1:1932"></textarea>
          </div>

        </div>

        <!-- 檔案上傳區 -->
        <div class="upload-area" data-node-id="1:1933">
          <label class="btn-select-file" for="fileInput" data-node-id="1:1934">選擇檔案</label>
          <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.mp4" style="display:none;">
          <!-- 已選檔案預覽 -->
          <div class="selected-file" id="selectedFile" style="display:none;">
            <p class="file-name" id="selectedFileName"></p>
            <button class="btn-remove-file" id="btnRemoveFile" aria-label="移除檔案">
              <img src="assets/delete-icon.svg" alt="刪除" loading="lazy">
            </button>
          </div>
          <p class="upload-hint" data-node-id="1:1936">＊支援圖片.jpg、影片.mp4，最大 5MB</p>
        </div>

        <!-- 驗證碼 -->
        <div class="form-group captcha-group" data-node-id="1:1937">
          <label class="form-label" data-node-id="1:1938">驗證碼</label>
          <div class="captcha-row" data-node-id="1:1939">
            <input class="form-input" type="text" id="inputCaptcha" placeholder="請輸入驗證碼" data-node-id="1:1940">
            <canvas class="captcha-canvas" id="captchaCanvas" width="119" height="47" data-node-id="1:1941"></canvas>
          </div>
        </div>

        <!-- 操作按鈕 -->
        <div class="form-actions" data-node-id="1:1942">
          <button class="btn btn-cancel" id="btnCancel" data-node-id="1:1943">離開</button>
          <button class="btn btn-submit" id="btnSubmit" data-node-id="1:1945">確認建立</button>
        </div>

      </div>
      <!-- /form-content -->

    </div>
    <!-- /form-view -->

    <!-- ==================== 完成確認視圖 ==================== -->
    <div class="confirm-view" id="confirmView" style="display: none;" data-node-id="1:2128">

      <div class="confirm-content" data-node-id="1:2130">
        <!-- 成功訊息卡片 -->
        <div class="confirm-card" data-node-id="1:2131">
          <div class="confirm-icon-wrap" data-node-id="1:2155">
            <svg class="confirm-check-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="32" r="30" stroke="#b8a676" stroke-width="2" fill="none" opacity="0.4"/>
              <circle cx="32" cy="32" r="24" stroke="#b8a676" stroke-width="2" fill="none"/>
              <path d="M20 33 L28 41 L44 25" stroke="#b8a676" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="confirm-message" data-node-id="1:2138">
            表單填寫完成<br>我們將盡速與您做確認
          </p>
        </div>

        <!-- 確認按鈕（返回首頁） -->
        <button class="btn btn-confirm-home" id="btnConfirmHome" data-node-id="1:2139">確認</button>
      </div>

    </div>
    <!-- /confirm-view -->

  </div>
  <!-- /crm-repair-form -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <script src="js/crm-repair-form.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
