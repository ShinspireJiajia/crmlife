      <!-- 附加題目區塊 -->
      <div class="survey-questions-card">

        <!-- 複選題 -->
        <div class="question-item">
          <p class="question-label">本次服務中，哪些方面讓您感到滿意？<span class="question-type-tag">可複選</span></p>
          <div class="checkbox-group" data-key="satisfiedAspects">
            <label class="checkbox-option">
              <input type="checkbox" value="attitude">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">人員服務態度</span>
            </label>
            <label class="checkbox-option">
              <input type="checkbox" value="quality">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">施工品質</span>
            </label>
            <label class="checkbox-option">
              <input type="checkbox" value="cleanliness">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">完工整潔度</span>
            </label>
            <label class="checkbox-option">
              <input type="checkbox" value="communication">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">溝通說明清楚</span>
            </label>
            <label class="checkbox-option">
              <input type="checkbox" value="punctual">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">準時到場</span>
            </label>
          </div>
        </div>

        <div class="question-divider"></div>

        <!-- 單選題 -->
        <div class="question-item">
          <p class="question-label">您是否願意將我們的服務推薦給親友？<span class="question-type-tag">單選</span></p>
          <div class="radio-group" data-key="recommendation">
            <label class="radio-option">
              <input type="radio" name="recommendation" value="definitely">
              <span class="radio-custom"></span>
              <span class="radio-text">非常願意</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="recommendation" value="yes">
              <span class="radio-custom"></span>
              <span class="radio-text">願意</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="recommendation" value="maybe">
              <span class="radio-custom"></span>
              <span class="radio-text">不確定</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="recommendation" value="no">
              <span class="radio-custom"></span>
              <span class="radio-text">不願意</span>
            </label>
          </div>
        </div>

        <div class="question-divider"></div>

        <!-- 單行輸入框 -->
        <div class="question-item question-item--last">
          <p class="question-label">如有其他建議，歡迎留言：</p>
          <input type="text" class="survey-text-input" id="surveyComment" placeholder="請輸入您的建議或意見">
        </div>

      </div>
