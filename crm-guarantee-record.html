<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>檢視紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/signature-pad.css">
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-guarantee-record.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 對保服務檢視紀錄頁面容器 -->
  <div class="crm-guarantee-record" data-node-id="29:1665">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="29:1666">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="檢視紀錄" data-back="crm-guarantee-service.html"></div>

    <!-- 主要內容區域 -->
    <div class="record-content" data-node-id="29:1667">

      <!-- 預約詳情卡片 -->
      <div class="detail-card" data-node-id="29:1669">

        <!-- 單號 + 狀態標籤 -->
        <div class="card-header">
          <p class="card-number" data-node-id="248:1393" id="orderNumber">20250901-002</p>
          <div class="status-badge" id="statusBadge">
            <span>已完成</span>
          </div>
        </div>

        <div class="detail-list" data-node-id="29:1670">
          <p class="detail-row" data-node-id="29:1671">
            <span class="detail-label">建案</span>｜綠海建案
          </p>
          <p class="detail-row" data-node-id="29:1672">
            <span class="detail-label">戶別</span>｜B1
          </p>

          <p class="detail-row" data-node-id="29:1674">
            <span class="detail-label">日期</span>｜2025/08/21
          </p>
          <p class="detail-row" data-node-id="29:1675">
            <span class="detail-label">時段</span>｜10:00
          </p>
          <!-- 備註事項 -->
          <div class="detail-note" data-node-id="29:1676">
            <div class="note-content" data-node-id="29:1677">
              <p class="note-title" data-node-id="29:1678">備註事項</p>
              <p class="note-text" data-node-id="29:1679">您的房屋健檢報告已完成，這份報告詳細記錄了您愛屋的各項檢查結果。</p>
            </div>
          </div>
          <!-- 查看已填寫的問卷連結 -->
          <a class="survey-link" id="surveyLink" href="#" data-node-id="248:1387">
            <span data-node-id="248:1388">查看已填寫的問卷</span>
            <img src="assets/chevron-right-gold.svg" alt="" class="link-arrow" data-node-id="248:1389" loading="lazy">
          </a>
        </div>

        <!-- 分隔線 -->
        <div class="card-divider" data-node-id="29:1680">
          <img src="assets/divider-line2.svg" alt="" loading="lazy">
        </div>

        <!-- 住戶簽名確認（由共用元件動態產生） -->
        <div id="signatureMount"></div>
      </div>

      <!-- 下載附件區 -->
      <div class="download-section" data-node-id="29:1691">
        <div class="section-header" data-node-id="29:1692">
          <img class="section-icon" src="assets/download-icon.svg" alt="" data-node-id="29:1693" loading="lazy">
          <p class="section-title" data-node-id="29:1698">下載附件</p>
        </div>
        <div class="attachment-item" data-node-id="29:1699">
          <p class="file-name" data-node-id="29:1700">代辦費涵蓋地政登記.pdf</p>
          <button class="download-btn" data-action="download" data-file="agency-fee-registration.pdf" data-node-id="29:1701">
            <img src="assets/download-btn.svg" alt="下載" loading="lazy">
          </button>
        </div>
        <div class="attachment-item" data-node-id="29:1703">
          <p class="file-name" data-node-id="29:1704">銀行貸款協辦及相關規費代墊.pdf</p>
          <button class="download-btn" data-action="download" data-file="bank-loan-assistance.pdf" data-node-id="29:1705">
            <img src="assets/download-btn.svg" alt="下載" loading="lazy">
          </button>
        </div>
        <div class="attachment-item" data-node-id="29:1707">
          <p class="file-name" data-node-id="29:1708">詳細項目請參閱合約說明.pdf</p>
          <button class="download-btn" data-action="download" data-file="contract-details.pdf" data-node-id="29:1709">
            <img src="assets/download-btn.svg" alt="下載" loading="lazy">
          </button>
        </div>
      </div>

      <!-- 聯絡專員區 -->
      <div class="chat-section" data-node-id="29:1711">
        <div class="section-header" data-node-id="29:1712">
          <img class="section-icon" src="assets/chat-icon.svg" alt="" data-node-id="29:1713" loading="lazy">
          <p class="section-title" data-node-id="29:1718">聯絡專員</p>
        </div>
        <div class="chat-area" data-node-id="29:1719">
          <div class="chat-messages" data-node-id="29:1720">
            <!-- 第1則：使用者訊息 -->
            <div class="chat-msg-user" data-node-id="29:1721">
              <div class="msg-bubble" data-node-id="29:1722">請問大約什麼時候可以維修？</div>
              <p class="msg-time" data-node-id="29:1724">2025/08/05 10:30 AM</p>
            </div>
            <!-- 第2則：專員回覆 -->
            <div class="chat-msg-agent" data-node-id="29:1726">
              <div class="msg-bubble" data-node-id="29:1727">您好，約下午會派維修人員過去</div>
              <div class="attachment-item" data-node-id="29:1729">
                <p class="file-name" data-node-id="29:1730">聯絡資訊.jpg</p>
                <button class="download-btn" data-action="download" data-file="contact.jpg" data-node-id="29:1731">
                  <img src="assets/download-btn2.svg" alt="下載" loading="lazy">
                </button>
              </div>
              <p class="msg-sender" data-node-id="29:1734">王曉明 2025/08/05 10:30AM</p>
            </div>
          </div>
        </div>
        <!-- 我要留言按鈕 -->
        <button class="btn-leave-message" id="btnLeaveMessage">我要留言</button>
      </div>

    </div>
    <!-- /record-content -->

    <!-- 我要留言彈窗 -->
    <div class="message-modal-overlay" id="messageModalOverlay">
      <div class="message-modal">
        <!-- 訊息輸入區 -->
        <div class="message-input-area">
          <textarea class="message-textarea" id="messageTextarea" placeholder="請輸入訊息...."></textarea>
        </div>
        <!-- 附件上傳區 -->
        <div class="message-upload-area">
          <label class="btn-select-file" for="messageFileInput">
            選擇檔案
          </label>
          <input type="file" id="messageFileInput" accept=".jpg,.jpeg,.png,.mp4" style="display:none;">
          <!-- 已選檔案預覽 -->
          <div class="selected-file" id="selectedFile" style="display:none;">
            <p class="file-name" id="selectedFileName"></p>
            <button class="btn-remove-file" id="btnRemoveFile" aria-label="移除檔案">
              <img src="assets/delete-icon.svg" alt="刪除" loading="lazy">
            </button>
          </div>
          <p class="upload-hint">＊支援圖片.jpg、影片.mp4，最大 5MB</p>
        </div>
        <!-- 操作按鈕 -->
        <div class="message-modal-actions">
          <button class="btn btn-modal-cancel" id="btnMsgCancel">離開</button>
          <button class="btn btn-modal-send" id="btnMsgSend">發送訊息</button>
        </div>
      </div>
    </div>

  </div>
  <!-- /crm-guarantee-record -->

  <script src="js/signature-pad.js" defer></script>
  <!-- 共用頂部導覽列元件 -->

  <script src="js/crm-header.js" defer></script>

  <script src="js/crm-guarantee-record.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
