<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交屋服務</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 頁面樣式 -->
  <!-- 共用頂部導覽列樣式 -->
  <link rel="stylesheet" href="css/crm-global.css">
  <link rel="stylesheet" href="css/crm-header.css">
  <link rel="stylesheet" href="css/crm-handover-service.css">

  <!-- Loading 遮罩 inline 樣式（確保最快渲染） -->
  <style>
    .crm-page-loader{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#e8e4df;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease,visibility .35s ease}
    .crm-page-loader.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
    .crm-loader-spinner{width:40px;height:40px;border:3px solid rgba(169,158,145,.25);border-top-color:#a99e91;border-radius:50%;animation:crm-spin .7s linear infinite}
    .crm-loader-text{margin-top:16px;font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:14px;font-weight:500;color:#6b6560;letter-spacing:1px}
    @keyframes crm-spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- 全頁 Loading 遮罩 -->
  <div class="crm-page-loader" id="crmPageLoader">
    <div class="crm-loader-spinner"></div>
    <p class="crm-loader-text">載入中</p>
  </div>


  <!-- 交屋服務頁面容器 -->
  <div class="crm-handover-service" data-node-id="244:559">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="244:560">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（共用元件） -->


    <div id="crmHeader" data-title="交屋服務"></div>

    <!-- 主要內容區域 -->
    <div class="main-content" data-node-id="244:561">

      <!-- 預約交屋服務按鈕 -->
      <div style="width: 100%;" data-node-id="244:562">
        <button class="btn-reserve" id="btnReserve" data-node-id="244:563">
          預約交屋服務
        </button>
      </div>

      <!-- 服務卡片列表 -->
      <div class="card-list" data-node-id="244:565">

        <!-- 卡片 1：預約中 -->
        <div class="service-card" data-sort-date="2025-07-30 10:00" data-status="預約中" data-node-id="244:566">
          <!-- 狀態標籤與案件編號 -->
          <div class="card-header" data-node-id="244:567">
            <span class="status-badge status-pending" data-node-id="244:568">預約中</span>
            <span class="card-number" data-node-id="244:570">20250901-002</span>
          </div>
          <!-- 案件資訊 -->
          <div class="card-info" data-node-id="244:571">
            <p data-node-id="244:572">
              <span class="label">建　　案</span>｜綠海建案 (A3-3)
            </p>
            <p data-node-id="244:573">
              <span class="label">預約日期</span>｜2025/07/30 10:00
            </p>
          </div>
          <!-- 操作按鈕 -->
          <div class="card-actions" data-node-id="244:574">
            <button class="btn btn-outline" data-action="view-record" data-node-id="244:620">
              檢視紀錄
            </button>
          </div>
        </div>

        <!-- 卡片 2：已完成 -->
        <div class="service-card" data-sort-date="2025-06-15 14:00" data-status="已完成" data-node-id="244:580">
          <!-- 狀態標籤與案件編號 -->
          <div class="card-header" data-node-id="244:582">
            <span class="status-badge status-completed" data-node-id="244:584">已完成</span>
            <span class="card-number" data-node-id="244:583">20250901-003</span>
          </div>
          <!-- 案件資訊 -->
          <div class="card-info" data-node-id="244:581">
            <p data-node-id="244:586">
              <span class="label">建　　案</span>｜綠海建案 (A3-3)
            </p>
            <p data-node-id="244:587">
              <span class="label">預約日期</span>｜2025/06/15 14:00
            </p>
          </div>
          <!-- 操作按鈕 -->
          <div class="card-actions" data-node-id="244:588">
            <button class="btn btn-outline" data-action="view-record" data-node-id="244:590">
              檢視紀錄
            </button>
            <button class="btn btn-gold" data-action="survey" data-node-id="244:592">
              滿意度問卷
            </button>
          </div>
        </div>

      </div>
      <!-- /card-list -->

      <!-- 空狀態：無資料時顯示 -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">
          <img src="assets/empty-record-icon.svg" alt="" loading="lazy">
        </div>
        <p class="empty-text">無相關紀錄</p>
      </div>

    </div>
    <!-- /main-content -->

  </div>
  <!-- /crm-handover-service -->

  <!-- 共用頂部導覽列元件 -->


  <script src="js/crm-header.js" defer></script>


  <!-- JavaScript -->
  <script src="js/crm-handover-service.js" defer></script>

  <script src="js/crm-loading.js"></script>
</body>
</html>
